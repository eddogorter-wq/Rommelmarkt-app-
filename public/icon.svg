<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff7e5f"/>
      <stop offset="100%" stop-color="#feb47b"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  
  <g filter="url(#shadow)" transform="translate(110, 120)">
    <!-- Main Box -->
    <path d="M 46 160 L 246 160 C 260 160 270 170 270 184 L 270 260 C 270 280 255 295 235 295 L 57 295 C 37 295 22 280 22 260 L 22 184 C 22 170 32 160 46 160 Z" fill="#D2A679" stroke="#8c6239" stroke-width="8" stroke-linejoin="round"/>
    <!-- Box Flaps -->
    <path d="M 22 160 L -10 100 C -15 88 5 80 15 90 L 80 160 Z" fill="#E6C29A" stroke="#8c6239" stroke-width="8" stroke-linejoin="round"/>
    <path d="M 270 160 L 302 100 C 307 88 287 80 277 90 L 210 160 Z" fill="#E6C29A" stroke="#8c6239" stroke-width="8" stroke-linejoin="round"/>
    <path d="M 22 160 L 270 160 L 250 110 L 42 110 Z" fill="#C09060" stroke="#8c6239" stroke-width="8" stroke-linejoin="round"/>
    
    <!-- Items in the box -->
    <!-- Vintage Lamp -->
    <path d="M 70 110 L 70 50 L 130 50 L 130 110 Z" fill="#4B5563"/>
    <polygon points="100,0 60,50 140,50" fill="#10B981" stroke="#047857" stroke-width="6" stroke-linejoin="round"/>
    <circle cx="100" cy="80" r="15" fill="#FBBF24"/>
    
    <!-- Old vinyl record -->
    <ellipse cx="200" cy="110" rx="60" ry="70" fill="#1F2937"/>
    <ellipse cx="200" cy="110" rx="45" ry="55" fill="#374151"/>
    <ellipse cx="200" cy="110" rx="20" ry="25" fill="#EF4444"/>
    <ellipse cx="200" cy="110" rx="5" ry="5" fill="#F3F4F6"/>
    
    <!-- Teddy bear -->
    <circle cx="140" cy="130" r="30" fill="#A16207"/>
    <!-- Ears -->
    <circle cx="115" cy="105" r="12" fill="#854D0E"/>
    <circle cx="165" cy="105" r="12" fill="#854D0E"/>
    <!-- Snout -->
    <ellipse cx="140" cy="140" rx="15" ry="10" fill="#FEF08A"/>
    <circle cx="140" cy="137" r="4" fill="#000"/>
    <circle cx="128" cy="125" r="3" fill="#000"/>
    <circle cx="152" cy="125" r="3" fill="#000"/>
  </g>
</svg>
